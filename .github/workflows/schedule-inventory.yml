name: Scheduled Inventory Update

on:
  schedule:
    - cron: '45 */3 * * *'
  workflow_dispatch: # Allows manual trigger

concurrency:
  group: inventory-update
  cancel-in-progress: true

jobs:
  update-inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run alternating script
        env:
          SUPPLIER_API_URL_INVENTORY: ${{ secrets.SUPPLIER_API_URL_INVENTORY }}
          SUPPLIER_API_URL_INVENTORY_CAL: ${{ secrets.SUPPLIER_API_URL_INVENTORY_CAL }}
          SUPPLIER_API_KEY: ${{ secrets.SUPPLIER_API_KEY }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_PASSWORD: ${{ secrets.SHOPIFY_API_PASSWORD }}
          SHOPIFY_SHOP_NAME: ${{ secrets.SHOPIFY_SHOP_NAME }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SHOPIFY_LOCATION_ID: ${{ secrets.SHOPIFY_LOCATION_ID }}
          SHOPIFY_LOCATION_ID_CAL: ${{ secrets.SHOPIFY_LOCATION_ID_CAL }}
        run: |
  HOUR=$(date -u +%H)
  HOUR_INT=$((10#$HOUR))  # remove leading zero issues

  echo "Current UTC hour: $HOUR_INT"

  if (( HOUR_INT % 2 == 0 )); then
    echo "Running script A (even hour)"
    node runScript.js
  else
    echo "Running script C (odd hour)"
    node runScriptC.js
  fi
